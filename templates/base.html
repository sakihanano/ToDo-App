<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Todo App{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <header>
            <h1>📝 Todo App</h1>
            <nav class="header-nav">
                <a href="{{ url_for('home') }}" class="logo-link">ホーム</a>
                <a href="{{ url_for('index') }}" class="header-link">タスク一覧</a>
                <a href="{{ url_for('schedule') }}" class="header-link">スケジュール</a>
            </nav>
        </header>
        
        <main>
            {% block content %}{% endblock %}
        </main>
        
        <footer>
            <p>&copy; 2024 Simple Todo App</p>
        </footer>
    </div>
</body>
</html>
